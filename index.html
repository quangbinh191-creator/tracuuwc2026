<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRA CỨU DỰ ĐOÁN WORLD CUP 2026 🏆</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, rgba(6, 78, 59, 0.8) 0%, rgba(15, 23, 42, 0.85) 100%), 
                        url('https://phongvu.vn/cong-nghe/wp-content/uploads/2022/12/hinh-nen-bong-da-1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .text-neon {
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.6), 0 0 20px rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col items-center p-4 sm:p-8 selection:bg-yellow-400 selection:text-black">

    <header class="text-center my-8 max-w-2xl animate-fade-in">
        <div class="inline-block bg-yellow-500 text-slate-900 text-xs font-black px-4 py-1 rounded-full uppercase tracking-widest mb-3 shadow-lg shadow-yellow-500/20">
            FIFA World Cup 2026 🇺🇸 🇨🇦 🇲🇽
        </div>
        <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-white uppercase text-neon">
            TRA CỨU <span class="text-green-400">DỰ ĐOÁN</span>
        </h1>
        <p class="text-slate-400 mt-2 text-sm sm:text-base">Nhập thông tin cá nhân để xem lại hành trình tiên tri và số điểm của bạn!</p>
    </header>

    <main class="w-full max-w-md bg-slate-900/80 backdrop-blur-md border border-slate-700/50 p-6 sm:p-8 rounded-2xl shadow-2xl shadow-black/50">
        <form id="searchForm" onsubmit="handleSearch(event)" class="space-y-5">
            <div>
                <label for="nickname" class="block text-xs font-bold uppercase tracking-wider text-green-400 mb-2">
                    Nickname (Biệt danh hiển thị BXH)
                </label>
                <input type="text" id="nickname" required autocomplete="off"
                    placeholder="Ví dụ: Pele_2026" 
                    class="w-full bg-slate-800/85 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/20 transition-all font-medium">
            </div>

            <div>
                <label for="email" class="block text-xs font-bold uppercase tracking-wider text-green-400 mb-2">
                    Password (123@gmail.com)
                </label>
                <input type="email" id="email" required autocomplete="on"
                    placeholder="name@example.com" 
                    class="w-full bg-slate-800/85 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/20 transition-all font-medium">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-green-500/20 active:scale-[0.99] transition-all cursor-pointer text-center uppercase tracking-wider text-sm flex items-center justify-center gap-2">
                ⚽ Bắt Đầu Tra Cứu
            </button>
        </form>
    </main>

    <section id="resultContainer" class="hidden w-full max-w-4xl mt-10 bg-slate-900/95 border-2 border-yellow-500/30 rounded-2xl p-6 shadow-2xl backdrop-blur-md">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-700 pb-4 mb-4 gap-4">
            <div>
                <h2 class="text-xl font-bold text-yellow-400 flex items-center gap-2">
                    📋 KẾT QUẢ DỰ ĐOÁN & ĐIỂM SỐ
                </h2>
                <p class="text-xs text-slate-400 mt-1">Dữ liệu đối chiếu trực tiếp từ Ban Tổ Chức</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="userTotalPoints" class="bg-gradient-to-r from-yellow-500 to-amber-600 text-slate-950 font-black px-4 py-1.5 rounded-xl text-sm tracking-wide shadow-md shadow-yellow-500/10">
                    Tổng điểm: 0đ
                </span>
                <span id="userBadge" class="bg-blue-600 text-white font-bold px-3 py-1.5 rounded-xl text-xs uppercase tracking-wide">
                    -
                </span>
            </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-800">
            <table class="w-full text-sm text-left table-auto">
                <thead class="bg-slate-800 text-slate-300 uppercase text-xs tracking-wider">
                    <tr>
                        <th class="px-4 py-3 font-bold text-green-400 min-w-[200px]">Hạng mục dự đoán</th>
                        <th class="px-4 py-3 font-bold text-yellow-400 min-w-[150px]">Lựa chọn của bạn</th>
                        <th class="px-4 py-3 font-bold text-emerald-400 min-w-[150px]">Kết Quả Chung Cuộc</th>
                        <th class="px-4 py-3 font-bold text-cyan-400 text-center w-[100px]">Điểm số</th>
                    </tr>
                </thead>
                <tbody id="resultTableBody" class="divide-y divide-slate-800">
                </tbody>
            </table>
        </div>
    </section>

    <script>
        // CẤU HÌNH ĐƯỜNG DẪN 2 FILE GOOGLE SHEET CSV
        const URL_USER_PREDICTIONS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=267813523&single=true&output=csv';
        const URL_MATCH_RESULTS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=652215163&single=true&output=csv';

        // Hàm helper chuyển đổi Papa.parse sang Promise để dễ đồng bộ (async/await)
        function parseCsvPromise(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: false,
                    complete: (results) => resolve(results.data),
                    error: (error) => reject(error)
                });
            });
        }

        async function handleSearch(event) {
            event.preventDefault();
            
            const nicknameInput = document.getElementById('nickname').value.trim();
            const emailInput = document.getElementById('email').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const resultTableBody = document.getElementById('resultTableBody');
            const userBadge = document.getElementById('userBadge');
            const userTotalPoints = document.getElementById('userTotalPoints');

            try {
                // Tải song song cả 2 sheet cùng một lúc để tối ưu tốc độ tra cứu nhanh nhất
                const [userRows, resultRows] = await Promise.all([
                    parseCsvPromise(URL_USER_PREDICTIONS),
                    parseCsvPromise(URL_MATCH_RESULTS)
                ]);

                if (userRows.length < 2 || resultRows.length < 2) {
                    alert('Không tìm thấy dữ liệu hợp lệ trên hệ thống Sheet.');
                    return;
                }

                // --- XỬ LÝ SHEET NGƯỜI CHƠI ---
                const userHeaders = userRows[0];
                const idxNickname = userHeaders.findIndex(h => h.trim().toLowerCase() === 'biệt danh');
                const idxEmail = userHeaders.findIndex(h => h.trim().toLowerCase() === 'email');

                if (idxNickname === -1 || idxEmail === -1) {
                    alert('Lỗi cấu hình Sheet người chơi: Thiếu cột "Biệt Danh" hoặc "Email".');
                    return;
                }

                let foundUserRow = null;
                for (let i = 1; i < userRows.length; i++) {
                    const currentRow = userRows[i];
                    if (
                        currentRow[idxNickname]?.trim().toLowerCase() === nicknameInput.toLowerCase() &&
                        currentRow[idxEmail]?.trim().toLowerCase() === emailInput.toLowerCase()
                    ) {
                        foundUserRow = currentRow;
                        break;
                    }
                }

                if (!foundUserRow) {
                    alert('❌ Sai Nickname hoặc Email đăng ký rồi! Vui lòng kiểm tra kỹ lại.');
                    resultContainer.classList.add('hidden');
                    return;
                }

                // --- XỬ LÝ SHEET ĐÁP ÁN (KẾT QUẢ TRẬN ĐẤU) ---
                // Giả định Sheet kết quả trận đấu có dòng 1 (index 0) trùng khớp tên cột/hạng mục với Sheet người chơi, 
                // và dòng 2 (index 1) chứa kết quả đúng của trận đấu đó.
                const resultHeaders = resultRows[0];
                const officialResults = resultRows[1] || [];

                // --- TIẾN HÀNH ĐỐI CHIẾU, TÍNH ĐIỂM & RENDER ---
                let tableContentHtml = '';
                let totalScore = 0;
                const maxColumns = Math.min(79, userHeaders.length); // Giới hạn A -> CA (79 cột)

                for (let colIdx = 0; colIdx < maxColumns; colIdx++) {
                    const columnName = userHeaders[colIdx]?.trim() || `Cột ${colIdx + 1}`;
                    const userValue = foundUserRow[colIdx]?.trim() || '';
                    
                    // Tìm đáp án đúng tương ứng bằng cách dò tên cột ở Sheet Kết quả trận đấu
                    const matchResultIdx = resultHeaders.findIndex(h => h.trim().toLowerCase() === columnName.toLowerCase());
                    let correctValue = '---'; // Mặc định nếu trận đấu chưa có kết quả hoặc không tìm thấy cột
                    if (matchResultIdx !== -1 && officialResults[matchResultIdx]) {
                        correctValue = officialResults[matchResultIdx].trim();
                    }

                    // Tính điểm cho hạng mục hiện tại
                    let earnedPoints = 0;
                    let pointDisplay = '0đ';
                    let statusClass = 'text-slate-500';

                    // Chỉ tính điểm khi trận đấu đã có kết quả chính thức (khác trống và khác '---')
                    if (correctValue !== '' && correctValue !== '---' && userValue !== '') {
                        if (userValue.toLowerCase() === correctValue.toLowerCase()) {
                            // Kiểm tra xem hạng mục này có được nhân đôi điểm không
                            const isX2 = columnName.toLowerCase().includes('[trận x2 điểm]');
                            earnedPoints = isX2 ? 2 : 1;
                            totalScore += earnedPoints;
                            
                            pointDisplay = `+${earnedPoints}đ`;
                            statusClass = isX2 ? 'text-amber-400 font-black' : 'text-emerald-400 font-bold';
                        } else {
                            pointDisplay = '0đ';
                            statusClass = 'text-rose-400/80';
                        }
                    }

                    // Màu nền xen kẽ hàng
                    const rowBg = colIdx % 2 === 0 ? 'bg-slate-900/40' : 'bg-slate-800/30';

                    tableContentHtml += `
                        <tr class="${rowBg} hover:bg-slate-800/80 transition-colors">
                            <td class="px-4 py-3.5 font-semibold text-slate-300 border-r border-slate-800/50">${columnName}</td>
                            <td class="px-4 py-3.5 text-yellow-400 font-bold tracking-wide border-r border-slate-800/50">${userValue || '---'}</td>
                            <td class="px-4 py-3.5 text-emerald-400 font-medium border-r border-slate-800/50">${correctValue}</td>
                            <td class="px-4 py-3.5 text-center ${statusClass} tracking-wide">${pointDisplay}</td>
                        </tr>
                    `;
                }

                // Hiển thị thông tin lên giao diện công khai
                userBadge.innerText = `🎮 ${foundUserRow[idxNickname]}`;
                userTotalPoints.innerText = `Tổng điểm: ${totalScore}đ`;
                resultTableBody.innerHTML = tableContentHtml;
                resultContainer.classList.remove('hidden');
                
                // Cuộn xuống xem kết quả một cách mượt mà
                resultContainer.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                alert('Không thể kết nối hoặc xử lý dữ liệu từ Google Sheet. Hãy kiểm tra lại quyền truy cập cấu hình chia sẻ.');
                console.error(error);
            }
        }
    </script>
</body>
</html>
